# Alembic configuration file
# The alembic.ini file is used by the alembic command to find the migration repository
# and understand how it is organized. It also contains settings about the database.

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# missing value or false
# script_location = /app/alembic
# prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now(timezone())
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field:
# set to 0 to disable
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# as_revision_base = false

# set to 'false' to NOT run environment during the 'revision' command
# rev_id = false

# Logging configuration
# invoke logging.config.fileConfig in env.py
# use_logging_config = true

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ai_onboarding

# databases which support the SELECT FOR UPDATE clause should set this to true
# false otherwise
# sqlalchemy.pool_pre_ping = true
